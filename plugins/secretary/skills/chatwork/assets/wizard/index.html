<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>接続設定 — yasashii-secretary</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <p class="product">yasashii-secretary</p>
    <p class="privacy">この画面はこのPCだけで開いています</p>
  </header>
  <main class="shell">
    <nav class="steps" aria-label="設定の進み具合">
      <span data-progress="0" aria-current="step">接続</span>
      <span data-progress="1">1 ルーム</span>
      <span data-progress="2">2 自動取得の間隔</span>
      <span data-progress="3">3 確認</span>
      <span data-progress="4">4 結果</span>
    </nav>
    <section id="app" aria-live="polite">
      <p class="service-context">接続サービスの設定</p>
      <p class="eyebrow">接続状態</p>
      <h1>接続状態を確認しています。</h1>
      <p class="lead" data-copy-role="status">接続情報はこの画面へ入力しません。</p>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
