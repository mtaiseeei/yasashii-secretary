name: Chatwork sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: discover または initial
        required: true
        default: discover
        type: choice
        options:
          - discover
          - initial

permissions:
  contents: write

concurrency:
  group: chatwork-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.event.repository.private == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Chatworkから取得
        id: chatwork
        continue-on-error: true
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
        run: node chatwork/scripts/chatwork-sync.mjs "${{ inputs.mode }}" "$GITHUB_WORKSPACE"
      - name: 結果を同じrepoへ記録
        if: always()
        run: |
          git config user.name "yasashii-secretary[bot]"
          git config user.email "yasashii-secretary[bot]@users.noreply.github.com"
          git add chatwork/rooms.json chatwork/state chatwork/history
          if git diff --cached --quiet; then
            echo "更新はありません"
          else
            git commit -m "Chatworkの取得結果を更新"
            git push
          fi
      - name: 取得失敗を通知
        if: steps.chatwork.outcome != 'success'
        run: |
          echo "Chatworkの取得に失敗しました。stateファイルで原因を確認してください。" >&2
          exit 1
