<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chatwork設定 — yasashii-secretary</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <p class="product">yasashii-secretary</p>
    <p class="privacy">この画面はこのPCだけで開いています</p>
  </header>
  <main class="shell">
    <nav class="steps" aria-label="設定の進み具合">
      <span data-progress="1" aria-current="step">1 room</span>
      <span data-progress="2">2 頻度</span>
      <span data-progress="3">3 確認</span>
      <span data-progress="4">4 結果</span>
    </nav>
    <section id="app" aria-live="polite">
      <p class="eyebrow">CHATWORK SETUP</p>
      <h1>保存するroomを選びます。</h1>
      <p class="lead">room一覧を読み込んでいます。</p>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
