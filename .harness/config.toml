# ============================================================
# SETTINGS / 設定値
# ============================================================

# EN: Allowed value: 1. / JA: 設定可能値は1です。
version = 1

# EN: Allowed values: "balanced" or "fresh". / JA: "balanced"または"fresh"。
lifecycle = "balanced"

# EN: Claude Code roles inherit the current host model and effort by default.
# JA: Claude Codeの各roleは既定で現在のhost model / effortを継承します。
[hosts.claudeCode.roles.planner]
model = "inherit"
effort = "inherit"

[hosts.claudeCode.roles.generator]
model = "inherit"
effort = "inherit"

[hosts.claudeCode.roles.evaluator]
model = "inherit"
effort = "inherit"

# EN: Codex Planner handles requirements, acceptance criteria, and rubric design.
# JA: Codex Plannerは要件、受入条件、rubricを設計します。
[hosts.codex.roles.planner]
model = "gpt-5.6-sol"
effort = "high"

# EN: Standard Codex Generator handles normal implementation and the first implementation retry.
# JA: 通常のCodex Generatorは通常実装と1回目のimplementation retryを担当します。
[hosts.codex.roles.generator]
model = "gpt-5.6-luna"
effort = "xhigh"

# EN: Strong Generator settings and automatic escalation gates.
# JA: strong Generatorの設定と自動昇格条件です。
[hosts.codex.roles.generator.escalation]
model = "gpt-5.6-sol"
effort = "high"
after_failures = 2
on_evaluator_recommendation = true

# EN: Codex Evaluator performs evidence-backed evaluation and self-review; it never implements fixes.
# JA: Codex Evaluatorは証拠付き評価と自己レビューを行い、実装修正は行いません。
[hosts.codex.roles.evaluator]
model = "gpt-5.6-sol"
effort = "high"


# ============================================================
# REFERENCE / 設定方法・動作説明
# ============================================================

# EN: This shared file expresses repository runtime intent. Put personal leaf-only overrides in the
# EN: git-ignored .harness/config.local.toml. Resolution order is personal, shared, then plugin default.
# JA: この共有ファイルはrepoのruntime方針を表します。個人差分はgit管理外の
# JA: .harness/config.local.tomlへ必要なleafだけ書きます。優先順は個人、共有、plugin既定です。

# EN: AI editing contract: when the user asks an AI agent to change model or effort, it must consult the
# EN: current official reference for that host below and copy the exact supported model ID, alias, and effort.
# EN: Never guess, fuzzy-match, translate between hosts, or replace a requested value with a similar name.
# EN: If the exact value cannot be confirmed, preserve the current value (or use "inherit" for a new leaf)
# EN: and report that it was not changed. Documentation confirms spelling, not access on the current host.
# JA: AI編集規則: AIエージェントがmodelまたはeffortの変更を依頼された場合、下記の該当hostの
# JA: 最新公式資料を実際に確認し、正式なmodel ID、alias、effortをそのまま使います。
# JA: 推測、曖昧一致、host間の名前変換、似た名前への置換は行いません。正確な値を確認できない場合は
# JA: 現在値を維持し（新しいleafなら"inherit"を使い）、変更しなかったことを報告します。

# EN: "inherit" sends no role override. The role uses the parent main session (the current chat) or host default.
# JA: "inherit"はrole別overrideを渡さず、親の本チャットまたはhost既定を使います。
# EN: The Orchestrator is the current main chat; this file cannot change that chat's model.
# JA: オーケストレーターは現在の本チャットであり、このファイルから本チャットのmodelは変更できません。

# EN: "balanced" reuses a role only when host metadata verifies model/effort-preserving resume.
# EN: "fresh" starts new Generator and Evaluator work units at a Sprint boundary. The roles remain separate.
# JA: "balanced"はmodel / effortを保つresumeをhost metadataで確認できた場合だけroleを再利用します。
# JA: "fresh"はSprint境界でGeneratorとEvaluatorを新しくします。両roleは常に分離します。

# EN: If standard Luna is unavailable, Generator tries the configured strong Sol pair. If Sol is also
# EN: unavailable, both leaves inherit with a warning. Terra is never selected automatically.
# JA: 通常GeneratorのLunaが利用不能なら設定済みのstrong Solを試し、Solも利用不能なら警告付きで
# JA: model / effortをinheritへ戻します。Terraは自動選択しません。

# EN: A displayed Codex spawn schema may omit model, effort, and agent_type even when the runtime parser
# EN: accepts them. Try the resolver's exact dispatch-attempt values once on the actual role. Use agent_type,
# EN: never agent_role, for a custom agent. Resolver output is not launch proof; launch-verified requires
# EN: matching child host metadata or a host trace. This applies to every exact model/effort, not only Luna/Sol.
# JA: Codexの公開spawn schemaにmodel、effort、agent_typeが無くてもruntime parserが受理する場合があります。
# JA: resolverの正確なdispatch-attempt値を実roleで1回試し、custom agentにはagent_typeを使います。
# JA: resolver出力だけは実起動の証拠ではなく、launch-verifiedには一致するchild metadata等が必要です。

# Official references / 公式リファレンス:
# OpenAI API model IDs and capabilities: https://developers.openai.com/api/docs/models
# Codex model availability: https://developers.openai.com/codex/models
# Codex model/effort configuration: https://developers.openai.com/codex/config-reference
# Codex subagent controls and limits: https://developers.openai.com/codex/subagents
# Anthropic model IDs and capabilities: https://docs.anthropic.com/en/docs/about-claude/models/overview
# Claude Code model selection/configuration: https://code.claude.com/docs/en/model-config
# Claude Code subagent model controls: https://code.claude.com/docs/en/sub-agents
